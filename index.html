<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Сборки</title>
    <!-- Подключаем скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 15px;
        }
        h2 { text-align: center; color: var(--tg-theme-button-color, #ff4500); }
        .hero-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #2b2b2b);
            color: var(--tg-theme-text-color, #ffffff);
            border: 1px solid #444;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .build-card {
            background: var(--tg-theme-secondary-bg-color, #2b2b2b);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: none;
        }
        .item-section { margin-bottom: 12px; }
        .item-title { font-weight: bold; color: #ff9900; }
    </style>
</head>
<body>

    <h2>Dota 2 Актуальные Сборки</h2>
    
    <select id="heroSelect" class="hero-select" onchange="showBuild()">
        <option value="">-- Выбери героя --</option>
        <option value="slark">Slark</option>
        <option value="huskar">Huskar</option>
        <option value="silencer">Silencer</option>
    </select>

    <div id="buildCard" class="build-card">
        <h3 id="heroName">Герой</h3>
        <div class="item-section">
            <span class="item-title">Старт:</span> <span id="startItems"></span>
        </div>
        <div class="item-section">
            <span class="item-title">Мид-гейм:</span> <span id="midItems"></span>
        </div>
        <div class="item-section">
            <span class="item-title">Лейт:</span> <span id="lateItems"></span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяет окно на весь экран телеграма

        // База данных со сборками (для примера)
        const builds = {
            slark: {
                name: "Slark",
                start: "Orb of Corrosion, Power Treads, Magic Wand",
                mid: "Diffusal Blade, Shadow Blade, Aghanim's Scepter",
                late: "Manta Style, Eye of Skadi, Abyssal Blade"
            },
            huskar: {
                name: "Huskar",
                start: "Bracer, Bracer, Phase Boots, Armlet of Mordiggian",
                mid: "Heaven's Halberd, Black King Bar, Aegis",
                late: "Satanic, Assault Cuirass, Overwhelming Blink"
            },
            silencer: {
                name: "Silencer",
                start: "Circlet, Mantle, Iron Branch, Tango",
                mid: "Power Treads, Witch Blade, Force Staff",
                late: "Aghanim's Shard, Hurricane Pike, Scythe of Vyse, Parasma"
            }
        };

        function showBuild() {
            const select = document.getElementById('heroSelect');
            const card = document.getElementById('buildCard');
            const heroKey = select.value;

            if (heroKey && builds[heroKey]) {
                const hero = builds[heroKey];
                document.getElementById('heroName').innerText = hero.name;
                document.getElementById('startItems').innerText = hero.start;
                document.getElementById('midItems').innerText = hero.mid;
                document.getElementById('lateItems').innerText = hero.late;
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        }
    </script>
</body>
</html>
